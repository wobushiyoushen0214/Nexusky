name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: python -m pip install setuptools
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify Windows signing secrets
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          test -n "$WIN_CSC_LINK" || { echo "Missing WIN_CSC_LINK"; exit 1; }
          test -n "$WIN_CSC_KEY_PASSWORD" || { echo "Missing WIN_CSC_KEY_PASSWORD"; exit 1; }
      - run: pnpm exec electron-builder --win nsis --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexusky-windows
          path: |
            dist/*.exe
            !dist/__uninstaller*

  build-mac-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify mac signing secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          test -n "$CSC_LINK" || { echo "Missing MAC_CSC_LINK"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "Missing MAC_CSC_KEY_PASSWORD"; exit 1; }
          test -n "$APPLE_API_KEY" || { echo "Missing APPLE_API_KEY"; exit 1; }
          test -n "$APPLE_API_KEY_ID" || { echo "Missing APPLE_API_KEY_ID"; exit 1; }
          test -n "$APPLE_API_ISSUER" || { echo "Missing APPLE_API_ISSUER"; exit 1; }
      - run: pnpm exec electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexusky-mac-x64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify mac signing secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          test -n "$CSC_LINK" || { echo "Missing MAC_CSC_LINK"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "Missing MAC_CSC_KEY_PASSWORD"; exit 1; }
          test -n "$APPLE_API_KEY" || { echo "Missing APPLE_API_KEY"; exit 1; }
          test -n "$APPLE_API_KEY_ID" || { echo "Missing APPLE_API_KEY_ID"; exit 1; }
          test -n "$APPLE_API_ISSUER" || { echo "Missing APPLE_API_ISSUER"; exit 1; }
      - run: pnpm exec electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexusky-mac-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec electron-builder --linux AppImage --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexusky-linux
          path: dist/*.AppImage
