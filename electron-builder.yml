appId: com.nexusky.app
productName: Nexusky
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
publish:
  provider: github
  releaseType: release
win:
  forceCodeSigning: true
  verifyUpdateCodeSignature: true
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
mac:
  forceCodeSigning: true
  notarize: true
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: resources/icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icon.png
  category: Utility
