appId: com.nexusky.app
productName: Nexusky
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
beforePack: ./scripts/rebuild-native.js
publish:
  provider: github
  releaseType: release
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
  sign: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: resources/icon.png
  identity: null
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icon.png
  category: Utility
